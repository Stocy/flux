apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
    name: https-route
    namespace: paperless
spec:
    hostnames:
        - paperless.${SECRET_DOMAIN_0}
    parentRefs:
        - name: http-gateway
          sectionName: https
          namespace: kube-system
    rules:
        - backendRefs:
            - name: paperless
              port: 8000
